{% extends "base.html" %}

{% block title %}{{ work.title }} | Shakespeare NLP Explorer{% endblock %}

{% block content %}
<section class="section">
  <p class="eyebrow">{{ work.author }} · {{ work.year }}</p>
  <h1>{{ work.title }}</h1>
  <p class="lede">{{ work.description }}</p>

  <div class="tool-links">
    <a href="{{ url_for('frequency', slug=work.slug) }}">Word Frequency</a>
    <a href="{{ url_for('entities', slug=work.slug) }}">Named Entities</a>
    <a href="{{ url_for('pos_counts', slug=work.slug) }}">POS Counts</a>
    <a href="{{ url_for('search', slug=work.slug) }}">Search</a>
  </div>
</section>

<section class="section">
  <h2>Text Sample</h2>
  <pre class="text-sample">{{ work.text }}</pre>
</section>
{% endblock %}
