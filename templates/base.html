<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Shakespeare NLP Explorer{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <div class="app-shell">
      <aside class="side-nav" aria-label="Primary navigation">
        <a class="brand" href="{{ url_for('index') }}">
          <span class="brand-mark">SN</span>
          <span>
            <strong>Study Notes</strong>
            <small>Portfolio lab</small>
          </span>
        </a>

        <nav>
          <a class="{{ 'active' if request.endpoint == 'index' else '' }}" href="{{ url_for('index') }}">Home</a>
          <a class="{{ 'active' if request.endpoint != 'index' else '' }}" href="{{ url_for('work_detail', slug='hamlet') }}">Shakespeare NLP</a>
        </nav>
      </aside>

      <main class="page">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
